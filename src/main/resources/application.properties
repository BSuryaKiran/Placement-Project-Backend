spring.application.name=placement-api
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/placement_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:9281420060}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
app.jwt.secret=my-super-secret-key-that-is-at-least-32-characters-long-for-jwt-token-generation-security
app.jwt.expiration=86400000
app.jwt.refreshExpiration=604800000

# Mailgun Configuration
mailgun.domain=${MAILGUN_DOMAIN:sandbox9d8f68b5b7bc404dbb860093e23b7e89.mailgun.org}
mailgun.api.key=${MAILGUN_API_KEY}
mailgun.from=NexStep <postmaster@${mailgun.domain}>

# File Upload Configuration
file.upload.path=./uploads
file.upload.url=http://localhost:8080

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*